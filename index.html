<!DOCTYPE html>
<html>
<head>
    <title>Phishing Email Detector</title>
</head>
<body>
    <h2>Phishing Email Detector</h2>

    <form method="POST">
        <textarea name="email" rows="10" cols="50" placeholder="Paste email text here"></textarea><br><br>
        <input type="submit" value="Check">
    </form>

    {% if prediction %}
        <h3>Result: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
